name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-coverage:
    name: Test and coverage
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage-badge.outputs.coverage }}
      color: ${{ steps.coverage-badge.outputs.color }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build-coverage
          -DCMAKE_BUILD_TYPE=Debug
          -DECS_BUILD_EXAMPLE=OFF
          -DECS_BUILD_TESTING=ON
          -DECS_ENABLE_COVERAGE=ON

      - name: Build, test, and collect coverage
        shell: bash
        run: |
          set -o pipefail
          cmake --build build-coverage --target coverage | tee build-coverage/coverage.log

      - name: Create coverage badge
        id: coverage-badge
        shell: bash
        run: |
          coverage="$(sed -n 's/^-- Line coverage: \([0-9.]*\)%.*/\1/p' build-coverage/coverage.log | tail -n 1)"
          if [[ -z "${coverage}" ]]; then
            echo "Unable to find line coverage in build-coverage/coverage.log" >&2
            exit 1
          fi

          coverage_int="${coverage%.*}"
          color="red"
          if (( coverage_int >= 90 )); then
            color="brightgreen"
          elif (( coverage_int >= 80 )); then
            color="green"
          elif (( coverage_int >= 70 )); then
            color="yellowgreen"
          elif (( coverage_int >= 60 )); then
            color="yellow"
          elif (( coverage_int >= 50 )); then
            color="orange"
          fi

          mkdir -p badge
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "${coverage}" "${color}" > badge/coverage.json
          echo "coverage=${coverage}" >> "${GITHUB_OUTPUT}"
          echo "color=${color}" >> "${GITHUB_OUTPUT}"

  publish-coverage-badge:
    name: Publish coverage badge
    runs-on: ubuntu-latest
    needs: test-and-coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Create coverage badge artifact
        shell: bash
        run: |
          mkdir -p badge
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "${COVERAGE}" "${COLOR}" > badge/coverage.json
        env:
          COVERAGE: ${{ needs.test-and-coverage.outputs.coverage }}
          COLOR: ${{ needs.test-and-coverage.outputs.color }}

      - name: Upload coverage badge artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: badge

      - name: Deploy coverage badge to Pages
        id: deployment
        uses: actions/deploy-pages@v5
